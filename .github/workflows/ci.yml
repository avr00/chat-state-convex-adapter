name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # pkg-pr-new posts a sticky comment on PRs with the preview install URL
  pull-requests: write

jobs:
  check:
    name: Test, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm build

      - name: Publish preview package to pkg.pr.new
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
        run: pnpm dlx pkg-pr-new publish
